<svg width="128" height="128" viewBox="0 0 128 128" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="icon-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0f0f0;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="url(#bg-gradient)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- AI Brain icon -->
  <g transform="translate(32, 32)">
    <!-- Brain outline -->
    <path d="M32 8 C20 8, 12 16, 12 28 C12 40, 16 48, 24 52 L24 56 L40 56 L40 52 C48 48, 52 40, 52 28 C52 16, 44 8, 32 8 Z" 
          fill="url(#icon-gradient)" stroke="#4285f4" stroke-width="2"/>
    
    <!-- Neural network nodes -->
    <circle cx="24" cy="24" r="2" fill="#4285f4"/>
    <circle cx="32" cy="20" r="2" fill="#4285f4"/>
    <circle cx="40" cy="24" r="2" fill="#4285f4"/>
    <circle cx="28" cy="32" r="2" fill="#4285f4"/>
    <circle cx="36" cy="32" r="2" fill="#4285f4"/>
    
    <!-- Connecting lines -->
    <line x1="24" y1="24" x2="32" y2="20" stroke="#4285f4" stroke-width="1"/>
    <line x1="32" y1="20" x2="40" y2="24" stroke="#4285f4" stroke-width="1"/>
    <line x1="24" y1="24" x2="28" y2="32" stroke="#4285f4" stroke-width="1"/>
    <line x1="40" y1="24" x2="36" y2="32" stroke="#4285f4" stroke-width="1"/>
    <line x1="28" y1="32" x2="36" y2="32" stroke="#4285f4" stroke-width="1"/>
  </g>
  
  <!-- Google Ads symbol -->
  <g transform="translate(80, 80)">
    <circle cx="16" cy="16" r="12" fill="#34a853" stroke="#ffffff" stroke-width="2"/>
    <text x="16" y="20" font-family="Arial, sans-serif" font-size="8" font-weight="bold" 
          fill="white" text-anchor="middle">Ad</text>
  </g>
</svg>